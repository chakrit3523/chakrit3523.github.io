<!doctype html>
<html lang="en" class="scroll-smooth">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Chakrit Surakhumhang | Full Stack Developer</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css"
        />
        <style>
            :root {
                --sky-top: #d3f9ff;
                --sky-mid: #fff7ef;
                --sky-bottom: #ffdcb5;
                --dusk-top: #ffcd9f;
                --dusk-mid: #f7b8cf;
                --dusk-bottom: #babdff;
                --night-top: #131f4f;
                --night-mid: #294582;
                --night-bottom: #191f43;
                --ink-strong: #132647;
                --ink: #2b4f70;
                --ink-soft: #5c7591;
                --surface: rgba(255, 255, 255, 0.58);
                --surface-strong: rgba(255, 255, 255, 0.8);
                --surface-soft: rgba(255, 250, 243, 0.9);
                --line: rgba(58, 100, 151, 0.13);
                --line-strong: rgba(255, 255, 255, 0.78);
                --primary: #0f3d91;
                --secondary: #5aaeff;
                --accent: #d92d3a;
                --accent-soft: #ff7a86;
                --mint: #53d8b0;
                --violet: #8c94ff;
                --gold: #f8c861;
                --paint-rose: #ff6f7f;
                --paint-cyan: #73d9ff;
                --paint-gold: #ffc55b;
                --paint-lilac: #aca6ff;
                --iridescent-start: rgba(232, 67, 84, 0.2);
                --iridescent-end: rgba(87, 175, 255, 0.22);
                --shadow-soft: 0 24px 78px rgba(33, 63, 111, 0.14);
                --shadow-deep: 0 42px 120px rgba(20, 43, 83, 0.2);
                --scroll-progress: 0;
                --scene-progress: 0;
                --sun-x: 12vw;
                --sun-y: 74vh;
                --sun-scale: 0.94;
                --sun-opacity: 1;
                --moon-x: 76vw;
                --moon-y: 88vh;
                --moon-scale: 0.8;
                --moon-opacity: 0;
                --twilight-opacity: 0;
                --night-overlay: 0;
                --star-opacity: 0;
                --day-cloud-opacity: 1;
                --night-cloud-opacity: 0;
                --scene-shift: 0px;
            }

            * {
                box-sizing: border-box;
            }

            html {
                scroll-behavior: smooth;
                background: linear-gradient(
                    180deg,
                    var(--sky-top) 0%,
                    var(--sky-mid) 52%,
                    var(--sky-bottom) 100%
                );
                color-scheme: light;
                text-rendering: optimizeLegibility;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            body {
                margin: 0;
                min-height: 100vh;
                overflow-x: hidden;
                background: transparent;
                font-family: "Anuphan", sans-serif;
                color: var(--ink);
                letter-spacing: 0.001em;
            }

            ::selection {
                background: rgba(36, 123, 255, 0.22);
                color: var(--ink-strong);
            }

            h1,
            h2,
            h3,
            h4,
            strong,
            .nav-brand strong,
            .hero-title {
                margin: 0;
                font-family: "Sora", "Anuphan", sans-serif;
                letter-spacing: -0.045em;
                color: var(--ink-strong);
            }

            html[lang="th"] h1,
            html[lang="th"] h2,
            html[lang="th"] h3,
            html[lang="th"] h4,
            html[lang="th"] strong,
            html[lang="th"] .nav-brand strong,
            html[lang="th"] .hero-title {
                font-family: "Anuphan", sans-serif;
                letter-spacing: -0.03em;
            }

            p,
            li,
            a,
            button,
            span,
            small,
            em {
                font-family: inherit;
            }

            p,
            li {
                text-wrap: pretty;
            }

            a {
                color: inherit;
                text-decoration: none;
            }

            img {
                display: block;
                max-width: 100%;
            }

            button {
                border: 0;
                background: none;
                cursor: pointer;
                font: inherit;
            }

            ul {
                margin: 0;
                padding: 0;
                list-style: none;
            }

            #scroll-progress {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 4px;
                transform: scaleX(0);
                transform-origin: left center;
                background: linear-gradient(
                    90deg,
                    var(--accent),
                    var(--accent-soft),
                    var(--secondary),
                    var(--primary)
                );
                box-shadow: 0 0 20px rgba(24, 119, 242, 0.28);
                z-index: 80;
            }

            #cursor-glow {
                position: fixed;
                top: 0;
                left: 0;
                width: 18rem;
                height: 18rem;
                border-radius: 999px;
                pointer-events: none;
                opacity: 0;
                z-index: 5;
                background: radial-gradient(
                    circle,
                    rgba(255, 211, 151, 0.34),
                    rgba(119, 208, 255, 0.16) 42%,
                    rgba(255, 255, 255, 0) 72%
                );
                filter: blur(18px);
                mix-blend-mode: multiply;
                transition: opacity 180ms ease;
            }

            #sky-scene {
                position: fixed;
                inset: 0;
                overflow: hidden;
                pointer-events: none;
                z-index: -10;
                background:
                    radial-gradient(
                        ellipse at 16% 14%,
                        rgba(255, 255, 255, 0.95) 0 12%,
                        rgba(255, 255, 255, 0) 36%
                    ),
                    radial-gradient(
                        ellipse at 82% 18%,
                        rgba(255, 156, 168, 0.46) 0 14%,
                        rgba(255, 156, 168, 0) 38%
                    ),
                    linear-gradient(
                        180deg,
                        var(--sky-top) 0%,
                        var(--sky-mid) 46%,
                        var(--sky-bottom) 100%
                    );
            }

            #sky-scene::before,
            #sky-scene::after {
                content: "";
                position: absolute;
                inset: 0;
            }

            #sky-scene::before {
                background: linear-gradient(
                    180deg,
                    rgba(255, 165, 177, 0.18) 0%,
                    rgba(228, 73, 94, 0.26) 24%,
                    rgba(165, 188, 255, 0.38) 70%,
                    rgba(68, 88, 141, 0.44) 100%
                );
                opacity: var(--twilight-opacity);
            }

            #sky-scene::after {
                background: linear-gradient(
                    180deg,
                    rgba(15, 30, 69, 0.9) 0%,
                    rgba(30, 50, 94, 0.82) 38%,
                    rgba(28, 37, 73, 0.94) 100%
                );
                opacity: var(--night-overlay);
            }

            .sky-grid,
            .sky-wash,
            .sky-brush,
            .sky-ribbon,
            .sky-grain,
            .sun-arc,
            .sun-group,
            .moon-group,
            .cloud-band,
            .star-field,
            .horizon-glow {
                position: absolute;
            }

            .sky-grid {
                inset: -8%;
                background-image:
                    linear-gradient(
                        90deg,
                        rgba(255, 255, 255, 0.18) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        180deg,
                        rgba(255, 255, 255, 0.12) 1px,
                        transparent 1px
                    );
                background-size: 120px 120px;
                opacity: calc(0.12 - (var(--scene-progress) * 0.04));
                transform: translateY(calc(var(--scene-shift) * -0.06));
            }

            .sky-wash {
                inset: -10%;
                background:
                    radial-gradient(
                        ellipse at 16% 12%,
                        rgba(255, 255, 255, 0.85) 0 10%,
                        transparent 24%
                    ),
                    radial-gradient(
                        ellipse at 78% 18%,
                        rgba(255, 245, 229, 0.72) 0 11%,
                        transparent 26%
                    ),
                    radial-gradient(
                        ellipse at 24% 48%,
                        rgba(255, 255, 255, 0.42) 0 13%,
                        transparent 30%
                    ),
                    radial-gradient(
                        ellipse at 82% 62%,
                        rgba(255, 230, 205, 0.34) 0 14%,
                        transparent 28%
                    );
                opacity: calc(0.86 - (var(--scene-progress) * 0.26));
                filter: blur(18px);
                transform: translateY(calc(var(--scene-shift) * -0.12));
            }

            .sky-brush {
                inset: -18% -14%;
                background:
                    radial-gradient(
                        ellipse at 34% 26%,
                        rgba(229, 74, 97, 0.26) 0 16%,
                        transparent 42%
                    ),
                    radial-gradient(
                        ellipse at 70% 36%,
                        rgba(129, 218, 255, 0.32) 0 17%,
                        transparent 43%
                    ),
                    radial-gradient(
                        ellipse at 24% 74%,
                        rgba(255, 149, 166, 0.24) 0 15%,
                        transparent 40%
                    );
                opacity: calc(0.72 - (var(--night-overlay) * 0.28));
                filter: blur(44px) saturate(1.08);
                mix-blend-mode: soft-light;
                animation: brushShift 18s ease-in-out infinite;
            }

            .sky-ribbon {
                width: 160vw;
                height: 38vh;
                left: -32vw;
                border-radius: 50%;
                filter: blur(26px);
                mix-blend-mode: screen;
                transform-origin: center;
                opacity: calc(0.58 - (var(--night-overlay) * 0.18));
            }

            .ribbon-one {
                top: -8vh;
                background: linear-gradient(
                    100deg,
                    rgba(217, 45, 58, 0.26) 8%,
                    rgba(255, 129, 143, 0.24) 42%,
                    rgba(129, 213, 255, 0.3) 76%
                );
                animation: ribbonDrift 24s ease-in-out infinite;
            }

            .ribbon-two {
                top: 20vh;
                background: linear-gradient(
                    94deg,
                    rgba(117, 211, 255, 0.26) 10%,
                    rgba(195, 176, 255, 0.24) 50%,
                    rgba(255, 197, 126, 0.26) 86%
                );
                animation: ribbonDrift 30s ease-in-out infinite reverse;
            }

            .sky-grain {
                inset: 0;
                background-image: radial-gradient(
                    rgba(255, 255, 255, 0.2) 0.7px,
                    transparent 0.7px
                );
                background-size: 3px 3px;
                opacity: 0.1;
                mix-blend-mode: soft-light;
                animation: grainMove 12s steps(8) infinite;
            }

            .sun-arc {
                left: 50%;
                top: 7vh;
                width: min(1120px, 90vw);
                height: min(540px, 58vw);
                transform: translateX(-50%);
                border: 1px solid rgba(255, 255, 255, 0.34);
                border-bottom: 0;
                border-radius: 999px 999px 0 0;
                opacity: calc(0.7 - (var(--night-overlay) * 0.42));
                box-shadow: 0 -30px 70px rgba(255, 213, 156, 0.12);
            }

            .sun-group {
                left: 0;
                top: 0;
                width: clamp(8rem, 14vw, 14rem);
                height: clamp(8rem, 14vw, 14rem);
                transform: translate3d(var(--sun-x), var(--sun-y), 0)
                    scale(var(--sun-scale));
                opacity: var(--sun-opacity);
                filter: drop-shadow(0 0 26px rgba(255, 188, 98, 0.36));
            }

            .sun-halo,
            .sun,
            .sun-rays,
            .moon,
            .moon-crater,
            .cloud,
            .star,
            .portrait-backdrop,
            .portrait-orbit,
            .project-stage::before,
            .project-stage::after,
            .web-visual::before,
            .web-visual::after,
            .section-shell::before,
            .section-shell::after,
            .app-icon-stage::before,
            .app-icon-stage::after {
                position: absolute;
            }

            .sun-halo {
                inset: -16%;
                border-radius: 999px;
                background: radial-gradient(
                    circle,
                    rgba(255, 215, 126, 0.54),
                    rgba(255, 215, 126, 0.18) 48%,
                    transparent 72%
                );
                animation: haloPulse 6s ease-in-out infinite;
            }

            .sun {
                inset: 20%;
                border-radius: 999px;
                background: radial-gradient(
                    circle at 34% 34%,
                    #fff6d0 0%,
                    #ffd673 34%,
                    #ff9a51 82%,
                    #ff7443 100%
                );
                box-shadow:
                    inset 0 0 20px rgba(255, 255, 255, 0.36),
                    0 0 42px rgba(255, 166, 83, 0.38);
                z-index: 2;
            }

            .sun-rays {
                inset: 0;
                animation: raysSpin 18s linear infinite;
            }

            .ray {
                position: absolute;
                top: 50%;
                left: 50%;
                width: 0.75rem;
                height: 2.5rem;
                margin: -1.25rem 0 0 -0.375rem;
                border-radius: 999px;
                background: linear-gradient(
                    180deg,
                    rgba(255, 246, 212, 0.98),
                    rgba(255, 187, 73, 0.82)
                );
                transform-origin: 50% calc(100% + 3.3rem);
                animation: rayPulse 2.4s ease-in-out infinite;
                box-shadow: 0 0 16px rgba(255, 193, 89, 0.42);
            }

            .ray:nth-child(1) {
                transform: rotate(0deg) translateY(-4.4rem);
            }

            .ray:nth-child(2) {
                transform: rotate(45deg) translateY(-4.4rem);
            }

            .ray:nth-child(3) {
                transform: rotate(90deg) translateY(-4.4rem);
            }

            .ray:nth-child(4) {
                transform: rotate(135deg) translateY(-4.4rem);
            }

            .ray:nth-child(5) {
                transform: rotate(180deg) translateY(-4.4rem);
            }

            .ray:nth-child(6) {
                transform: rotate(225deg) translateY(-4.4rem);
            }

            .ray:nth-child(7) {
                transform: rotate(270deg) translateY(-4.4rem);
            }

            .ray:nth-child(8) {
                transform: rotate(315deg) translateY(-4.4rem);
            }

            .ray:nth-child(2),
            .ray:nth-child(4),
            .ray:nth-child(6),
            .ray:nth-child(8) {
                animation-delay: -0.8s;
            }

            .moon-group {
                left: 0;
                top: 0;
                width: clamp(7rem, 11vw, 10rem);
                height: clamp(7rem, 11vw, 10rem);
                transform: translate3d(var(--moon-x), var(--moon-y), 0)
                    scale(var(--moon-scale));
                opacity: var(--moon-opacity);
                filter: drop-shadow(0 0 22px rgba(210, 229, 255, 0.28));
            }

            .moon {
                inset: 0;
                border-radius: 999px;
                background: radial-gradient(
                    circle at 36% 30%,
                    #ffffff 0%,
                    #eef3ff 48%,
                    #c8d8ff 100%
                );
                box-shadow:
                    inset -10px -16px 24px rgba(171, 187, 226, 0.28),
                    0 0 24px rgba(221, 233, 255, 0.28);
            }

            .moon-crater {
                border-radius: 999px;
                background: rgba(170, 187, 228, 0.34);
            }

            .crater-one {
                width: 1rem;
                height: 1rem;
                top: 28%;
                left: 26%;
            }

            .crater-two {
                width: 1.35rem;
                height: 1.35rem;
                top: 52%;
                left: 20%;
            }

            .crater-three {
                width: 1.8rem;
                height: 1.8rem;
                top: 22%;
                right: 18%;
            }

            .cloud-band {
                left: -8%;
                width: 116%;
                display: flex;
                justify-content: space-between;
                gap: clamp(1rem, 2vw, 2.5rem);
                transform: translate3d(0, calc(var(--scene-shift) * -0.14), 0);
            }

            .cloud-band.day {
                opacity: var(--day-cloud-opacity);
            }

            .cloud-band.night {
                opacity: calc(var(--night-cloud-opacity) * 0.92);
            }

            .band-one {
                top: 12vh;
                animation: cloudDrift 84s linear infinite;
            }

            .band-two {
                top: 34vh;
                animation: cloudDriftReverse 98s linear infinite;
            }

            .band-three {
                top: 18vh;
                animation: cloudDrift 110s linear infinite;
            }

            .cloud {
                position: relative;
                border-radius: 999px;
                flex: 0 0 auto;
            }

            .cloud::before,
            .cloud::after {
                content: "";
                position: absolute;
                border-radius: inherit;
                background: inherit;
            }

            .day .cloud {
                background: rgba(255, 255, 255, 0.9);
                box-shadow:
                    0 20px 30px rgba(120, 169, 216, 0.12),
                    inset 0 -10px 16px rgba(208, 234, 255, 0.28);
            }

            .night .cloud {
                background: rgba(117, 140, 197, 0.3);
                box-shadow: 0 18px 26px rgba(10, 21, 47, 0.18);
            }

            .size-a {
                width: 14rem;
                height: 4.2rem;
            }

            .size-b {
                width: 10rem;
                height: 3.2rem;
            }

            .size-c {
                width: 12rem;
                height: 3.7rem;
            }

            .size-d {
                width: 8.6rem;
                height: 2.8rem;
            }

            .size-e {
                width: 15rem;
                height: 4.5rem;
            }

            .cloud.size-a::before {
                width: 5rem;
                height: 4.4rem;
                left: 2rem;
                top: -2rem;
            }

            .cloud.size-a::after {
                width: 6rem;
                height: 5rem;
                right: 2rem;
                top: -2.3rem;
            }

            .cloud.size-b::before {
                width: 3.4rem;
                height: 3rem;
                left: 1.3rem;
                top: -1.2rem;
            }

            .cloud.size-b::after {
                width: 4.2rem;
                height: 3.4rem;
                right: 1.2rem;
                top: -1.3rem;
            }

            .cloud.size-c::before {
                width: 4.2rem;
                height: 3.7rem;
                left: 1.4rem;
                top: -1.4rem;
            }

            .cloud.size-c::after {
                width: 4.8rem;
                height: 4rem;
                right: 1.6rem;
                top: -1.8rem;
            }

            .cloud.size-d::before {
                width: 3rem;
                height: 2.6rem;
                left: 1rem;
                top: -1rem;
            }

            .cloud.size-d::after {
                width: 3.5rem;
                height: 2.8rem;
                right: 1rem;
                top: -1.2rem;
            }

            .cloud.size-e::before {
                width: 5rem;
                height: 4.6rem;
                left: 1.8rem;
                top: -1.9rem;
            }

            .cloud.size-e::after {
                width: 6.6rem;
                height: 5.3rem;
                right: 1.6rem;
                top: -2.3rem;
            }

            .band-one .cloud:nth-child(2),
            .band-three .cloud:nth-child(2) {
                transform: translateY(3.4rem) scale(0.82);
            }

            .band-one .cloud:nth-child(3),
            .band-two .cloud:nth-child(2),
            .band-three .cloud:nth-child(4) {
                transform: translateY(1.1rem) scale(0.92);
            }

            .band-two .cloud:nth-child(1),
            .band-three .cloud:nth-child(1) {
                transform: translateY(4rem) scale(0.78);
            }

            .band-two .cloud:nth-child(4) {
                transform: translateY(2rem) scale(0.88);
            }

            .star-field {
                inset: 0;
                opacity: var(--star-opacity);
                transform: translateY(calc(var(--scene-shift) * -0.16));
            }

            .star {
                width: 0.9rem;
                height: 0.9rem;
                border-radius: 999px;
                background: rgba(248, 252, 255, 0.96);
                box-shadow:
                    0 0 16px rgba(255, 255, 255, 0.5),
                    0 0 28px rgba(157, 195, 255, 0.2);
                animation: twinkle 4.6s ease-in-out infinite;
            }

            .star::before,
            .star::after {
                content: "";
                position: absolute;
                left: 50%;
                top: 50%;
                background: rgba(248, 252, 255, 0.88);
                transform: translate(-50%, -50%);
            }

            .star::before {
                width: 1px;
                height: 1.2rem;
            }

            .star::after {
                width: 1.2rem;
                height: 1px;
            }

            .s1 {
                top: 11%;
                left: 12%;
            }

            .s2 {
                top: 18%;
                left: 22%;
                animation-delay: -0.8s;
            }

            .s3 {
                top: 10%;
                left: 34%;
                animation-delay: -1.2s;
            }

            .s4 {
                top: 22%;
                left: 45%;
            }

            .s5 {
                top: 13%;
                left: 58%;
                animation-delay: -1.8s;
            }

            .s6 {
                top: 8%;
                left: 71%;
                animation-delay: -2.4s;
            }

            .s7 {
                top: 17%;
                left: 84%;
            }

            .s8 {
                top: 32%;
                left: 18%;
                animation-delay: -1.4s;
            }

            .s9 {
                top: 38%;
                left: 30%;
                animation-delay: -2.2s;
            }

            .s10 {
                top: 34%;
                left: 52%;
            }

            .s11 {
                top: 30%;
                left: 68%;
                animation-delay: -1.1s;
            }

            .s12 {
                top: 40%;
                left: 79%;
            }

            .horizon-glow {
                left: 50%;
                bottom: -8vh;
                width: min(1100px, 88vw);
                height: 34vh;
                transform: translateX(-50%);
                border-radius: 999px;
                background: radial-gradient(
                    ellipse at center,
                    rgba(222, 68, 84, 0.28),
                    rgba(139, 214, 255, 0.18) 38%,
                    transparent 74%
                );
                filter: blur(62px);
                opacity: calc(0.82 - (var(--night-overlay) * 0.6));
            }

            #navbar {
                position: fixed;
                top: 1rem;
                left: 50%;
                width: min(1240px, calc(100% - 1rem));
                transform: translateX(-50%);
                z-index: 50;
            }

            .nav-shell {
                display: grid;
                grid-template-columns: auto 1fr auto;
                gap: 1rem;
                align-items: center;
                padding: 0.85rem 1rem;
                border-radius: 1.5rem;
                background: linear-gradient(
                    120deg,
                    rgba(255, 255, 255, 0.78),
                    rgba(255, 246, 237, 0.7) 45%,
                    rgba(238, 249, 255, 0.74)
                );
                border: 1px solid rgba(255, 255, 255, 0.74);
                box-shadow:
                    0 20px 52px rgba(66, 99, 143, 0.14),
                    inset 0 1px 0 rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                transition:
                    transform 260ms ease,
                    background 260ms ease,
                    border-color 260ms ease,
                    box-shadow 260ms ease;
            }

            #navbar.scrolled .nav-shell {
                transform: translateY(-0.1rem);
                background: linear-gradient(
                    120deg,
                    rgba(255, 255, 255, 0.86),
                    rgba(248, 255, 255, 0.78)
                );
                border-color: rgba(255, 255, 255, 0.88);

            function renderExperience() {

                                <div class="timeline-card-wrap">

                                        <div class="timeline-meta">
                                            <span class="timeline-date">${item.date}</span>

            function renderSkills() {
                const lang = content[currentLang];
                const renderDetailCards = (items) =>
                    (items || [])
                        .map((item) => {
                            if (typeof item === "string") {
                                return `<article class="language-chip"><div class="language-chip-head"><strong>${item}</strong></div></article>`;
                            }
                            const toneClass = item.tone ? ` ${item.tone}` : "";
                            const iconHtml = item.icon
                                ? `<span class="language-chip-icon"><i class="${item.icon}"></i></span>`
                                : "";
                            return `<article class="language-chip${toneClass}">
                            <div class="language-chip-head">
                                <div class="language-chip-main">
                                    ${iconHtml}
                                    <strong>${item.name || ""}</strong>

                                <span class="language-level">${item.level || ""}</span>
                            </div>
                            <small>${item.note || ""}</small>

                        })

                document.getElementById("code-languages-title").textContent =
                    lang.codeLanguagesTitle || "Programming Languages";
                document.getElementById("code-languages-intro").textContent =
                    lang.codeLanguagesIntro || "";
                document.getElementById("code-languages-list").innerHTML =
                    renderDetailCards(lang.codeLanguages);
                document.getElementById("design-skills-title").textContent =
                    lang.designSkillsTitle || "Design / UX Skills";
                document.getElementById("design-skills-intro").textContent =
                    lang.designSkillsIntro || "";
                document.getElementById("design-skills-list").innerHTML =
                    renderDetailCards(lang.designSkills);

                document.getElementById("skills-grid").innerHTML = lang.skills
                    .map(
                        (item, index) => `
                            <article class="skill-card reveal ${index % 4 === 1 ? "delay-1" : index % 4 === 2 ? "delay-2" : index % 4 === 3 ? "delay-3" : ""}" data-reveal="up" data-tilt>
                                <div class="skill-head">
                                    <span class="icon-token"><i class="${item.icon}"></i></span>
                                    <div>
                                        <h3>${item.title}</h3>
                                        <p>${item.summary}</p>

            function renderAISystem() {
                const lang = content[currentLang];
                const profiles = lang.aiProfiles || {};
                if (!profiles[aiMode]) {
                    aiMode = "recruiter";
                }
                const profile = profiles[aiMode] || {};

                document.getElementById("ai-intro").textContent =
                    profile.aiIntro || "";
                document.getElementById("ai-workflow-title").textContent =
                    profile.aiWorkflowTitle || "";
                document.getElementById("ai-architecture-title").textContent =
                    profile.aiArchitectureTitle || "";
                document.getElementById("ai-spec-title").textContent =
                    profile.aiSpecTitle || "";
                document.getElementById("ai-implementation-title").textContent =
                    profile.aiImplementationTitle || "";
                document.getElementById("ai-training-title").textContent =
                    profile.aiTrainingTitle || "";
                document.getElementById("ai-diff-title").textContent =
                    profile.aiDiffTitle || "";

                document.getElementById("ai-workflow-list").innerHTML =
                    htmlForBullets(profile.aiWorkflow || []);
                document.getElementById("ai-architecture-list").innerHTML =
                    htmlForBullets(profile.aiArchitecture || []);
                document.getElementById("ai-spec-list").innerHTML =
                    htmlForBullets(profile.aiSpecs || []);
                document.getElementById("ai-implementation-list").innerHTML =
                    htmlForBullets(profile.aiImplementation || []);
                document.getElementById("ai-training-list").innerHTML =
                    htmlForBullets(profile.aiTraining || []);
                document.getElementById("ai-diff-list").innerHTML =
                    htmlForBullets(profile.aiDifferentiators || []);

                const recruiterButton =
                    document.getElementById("ai-mode-recruiter");
                const technicalButton =
                    document.getElementById("ai-mode-technical");
                const recruiterActive = aiMode === "recruiter";

                recruiterButton.classList.toggle("active", recruiterActive);
                technicalButton.classList.toggle("active", !recruiterActive);
                recruiterButton.setAttribute(
                    "aria-pressed",
                    recruiterActive ? "true" : "false",
                );
                technicalButton.setAttribute(
                    "aria-pressed",
                    recruiterActive ? "false" : "true",
                );
            }

            function setAIMode(mode) {
                if (mode !== "recruiter" && mode !== "technical") return;
                if (aiMode === mode) return;
                aiMode = mode;
                renderAISystem();
                requestAnimationFrame(() => {
                    reveal();
                });
            }

            function renderProjects() {
                const lang = content[currentLang];
                document.getElementById("projects-grid").innerHTML =
                    lang.projects
                        .map(
                            (item, index) => `
                            <article class="project-card reveal ${index % 2 === 1 ? "delay-1" : index > 1 ? "delay-2" : ""}" data-reveal="up" data-tilt>
                                <div class="project-topline">
                                    <span class="project-index">${item.index}</span>
                                    <span class="project-ribbon">${item.ribbon}</span>
                                </div>
                                <div class="project-stage media-shell ${item.art}">
                                    <div class="app-icon-stage">
                                        <div class="media-fallback project-fallback" aria-hidden="true">
                                            <em>${item.eyebrow}</em>
                                            <strong>${item.monogram}</strong>
                                            <span>${item.subline}</span>
                                        </div>
                                        <img src="${item.img}" alt="${item.title} app icon" class="media-asset project-asset" />
                                    </div>
                                </div>
                                <div class="project-copy">
                                    <h3>${item.title}</h3>
                                    <p>${item.desc}</p>
                                    <div class="tag-row">${htmlForTags(item.tags)}</div>
                                    <div class="project-links">
                                        <a class="project-link ios" href="${item.ios}" target="_blank" rel="noreferrer">iOS</a>
                                        <a class="project-link android" href="${item.android}" target="_blank" rel="noreferrer">Android</a>

                                </div>

                        )

            }

            function renderWeb() {
                const lang = content[currentLang];
                const ui = uiCopy[currentLang];
                document.getElementById("web-grid").innerHTML = lang.webCards
                    .map(
                        (item, index) => `
                            <article class="web-card ${item.theme} reveal ${index === 1 ? "delay-1" : ""}" data-reveal="up" data-tilt>
                                <div class="web-visual">
                                    <span class="icon-token"><i class="${item.icon}"></i></span>
                                    <strong>${ui.liveSystem}</strong>
                                </div>
                                <div class="web-copy">
                                    <span class="card-kicker">${ui.liveSystem}</span>
                                    <h3>${item.title}</h3>
                                    <p>${item.desc}</p>
                                    <a class="web-link" href="${item.link}" target="_blank" rel="noreferrer">
                                        <span>${item.cta}</span>
                                        <i class="fa-solid fa-arrow-right"></i>
                                    </a>
                                </div>
                            </article>
                        `,
                    )
                    .join("");
            }

            function initMediaFallbacks(scope = document) {
                scope.querySelectorAll(".media-shell").forEach((shell) => {
                    if (shell.dataset.mediaReady === "true") return;
                    shell.dataset.mediaReady = "true";
                    const img = shell.querySelector("img");

                    if (!img) {
                        shell.classList.add("media-missing");
                        return;
                    }

                    const markLoaded = () => {
                        shell.classList.add("media-loaded");
                        shell.classList.remove("media-missing");
                    };

                    const markMissing = () => {
                        shell.classList.add("media-missing");
                        shell.classList.remove("media-loaded");
                    };

                    img.addEventListener("load", markLoaded, { once: true });
                    img.addEventListener("error", markMissing, { once: true });

                    if (img.complete) {
                        if (img.naturalWidth > 0) {
                            markLoaded();
                        } else {
                            markMissing();
                        }
                    }
                });
            }

            function typeWriter(reset = false) {
                const target = document.getElementById("typewriter");
                const text = content[currentLang].typewriter;
                if (!target) return;

                if (reset) {
                    clearTimeout(typewriterTimer);
                    typewriterIndex = 0;
                    target.textContent = "";
                }

                if (typewriterIndex < text.length) {
                    target.textContent += text.charAt(typewriterIndex);
                    typewriterIndex += 1;
                    typewriterTimer = window.setTimeout(() => typeWriter(), 24);
                }
            }

            function reveal(scope = document) {
                const elements = scope.querySelectorAll(".reveal");
                if (revealObserver) {
                    revealObserver.disconnect();
                }

                if (!("IntersectionObserver" in window)) {
                    elements.forEach((element) =>
                        element.classList.add("active"),
                    );
                    return;
                }

                revealObserver = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((entry) => {
                            if (entry.isIntersecting) {
                                entry.target.classList.add("active");
                                revealObserver.unobserve(entry.target);
                            }
                        });
                    },
                    {
                        threshold: 0.14,
                        rootMargin: "0px 0px -10% 0px",
                    },
                );

                elements.forEach((element) => {
                    if (element.classList.contains("active")) return;
                    const rect = element.getBoundingClientRect();
                    if (
                        rect.top < window.innerHeight * 0.92 &&
                        rect.bottom > window.innerHeight * 0.08
                    ) {
                        element.classList.add("active");
                        return;
                    }
                    revealObserver.observe(element);
                });
            }

            function initTilt(scope = document) {
                if (window.matchMedia("(pointer: coarse)").matches) return;

                scope.querySelectorAll("[data-tilt]").forEach((card) => {
                    if (card.dataset.tiltReady === "true") return;
                    card.dataset.tiltReady = "true";

                    card.addEventListener("pointermove", (event) => {
                        const rect = card.getBoundingClientRect();
                        const x = (event.clientX - rect.left) / rect.width;
                        const y = (event.clientY - rect.top) / rect.height;
                        const rotateY = (x - 0.5) * 8;
                        const rotateX = (0.5 - y) * 8;
                        card.style.transform = `perspective(1200px) rotateX(${rotateX.toFixed(2)}deg) rotateY(${rotateY.toFixed(2)}deg) translateY(-4px)`;
                    });

                    card.addEventListener("pointerleave", () => {
                        card.style.transform = "";
                    });
                });
            }

            function initMagneticButtons(scope = document) {
                if (window.matchMedia("(pointer: coarse)").matches) return;

                scope
                    .querySelectorAll(
                        ".button, .contact-link, .project-link, .web-link, .footer-link, .lang-button, .nav-link",
                    )
                    .forEach((button) => {
                        if (button.dataset.magneticReady === "true") return;
                        button.dataset.magneticReady = "true";

                        button.addEventListener("pointermove", (event) => {
                            const rect = button.getBoundingClientRect();
                            const x = (event.clientX - rect.left) / rect.width;
                            const y = (event.clientY - rect.top) / rect.height;
                            const moveX = (x - 0.5) * 8;
                            const moveY = (y - 0.5) * 8;
                            button.style.transform = `translate3d(${moveX}px, ${moveY}px, 0)`;
                        });

                        button.addEventListener("pointerleave", () => {
                            button.style.transform = "";
                        });
                    });
            }

            function updateSectionShells() {
                document
                    .querySelectorAll(".section-shell")
                    .forEach((shell, index) => {
                        const rect = shell.getBoundingClientRect();
                        const viewportCenter = window.innerHeight / 2;
                        const shellCenter = rect.top + rect.height / 2;
                        const distance =
                            (shellCenter - viewportCenter) / viewportCenter;
                        const clamped = Math.max(-1, Math.min(1, distance));
                        const lift = -clamped * 10;
                        const tilt = clamped * (index % 2 === 0 ? -0.42 : 0.42);
                        shell.style.setProperty(
                            "--shell-lift",
                            `${lift.toFixed(2)}px`,
                        );
                        shell.style.setProperty(
                            "--shell-tilt",
                            `${tilt.toFixed(2)}deg`,
                        );
                    });
            }

            function updateScrollState() {
                const root = document.documentElement;
                const maxScroll =
                    document.documentElement.scrollHeight - window.innerHeight;
                const progress = maxScroll > 0 ? window.scrollY / maxScroll : 0;
                const sceneProgress = Math.max(0, Math.min(1, progress));
                const isMobile =
                    window.matchMedia("(max-width: 720px)").matches;

                const sunX =
                    (isMobile ? 4 : 10) + sceneProgress * (isMobile ? 84 : 74);
                const sunY =
                    74 -
                    Math.sin(sceneProgress * Math.PI) * (isMobile ? 34 : 50);
                const sunScale =
                    0.92 + Math.sin(sceneProgress * Math.PI) * 0.18;
                const sunOpacity = Math.max(
                    0.14,
                    1 - Math.max(0, sceneProgress - 0.74) * 2.9,
                );

                const moonProgress = Math.max(
                    0,
                    Math.min(1, (sceneProgress - 0.56) / 0.44),
                );
                const moonX =
                    (isMobile ? 72 : 76) - moonProgress * (isMobile ? 10 : 16);
                const moonY =
                    88 -
                    Math.sin(moonProgress * Math.PI * 0.86) *
                        (isMobile ? 22 : 30) -
                    moonProgress * 12;
                const moonScale = 0.78 + moonProgress * 0.18;
                const moonOpacity = Math.max(
                    0,
                    Math.min(1, (sceneProgress - 0.58) / 0.18),
                );

                const twilightOpacity = Math.max(
                    0,
                    Math.min(0.86, (sceneProgress - 0.4) / 0.34),
                );
                const nightOverlay = Math.max(
                    0,
                    Math.min(0.88, (sceneProgress - 0.68) / 0.2),
                );
                const starOpacity = Math.max(
                    0,
                    Math.min(1, (sceneProgress - 0.72) / 0.18),
                );
                const dayCloudOpacity = Math.max(
                    0.1,
                    1 - Math.max(0, sceneProgress - 0.52) / 0.44,
                );
                const nightCloudOpacity = Math.max(
                    0,
                    Math.min(1, (sceneProgress - 0.64) / 0.22),
                );
                const sceneShift = (sceneProgress - 0.5) * (isMobile ? 34 : 64);

                document.getElementById("scroll-progress").style.transform =
                    `scaleX(${progress})`;
                root.style.setProperty(
                    "--scroll-progress",
                    progress.toFixed(4),
                );
                root.style.setProperty(
                    "--scene-progress",
                    sceneProgress.toFixed(4),
                );
                root.style.setProperty("--sun-x", `${sunX.toFixed(2)}vw`);
                root.style.setProperty("--sun-y", `${sunY.toFixed(2)}vh`);
                root.style.setProperty("--sun-scale", sunScale.toFixed(3));
                root.style.setProperty("--sun-opacity", sunOpacity.toFixed(3));
                root.style.setProperty("--moon-x", `${moonX.toFixed(2)}vw`);
                root.style.setProperty("--moon-y", `${moonY.toFixed(2)}vh`);
                root.style.setProperty("--moon-scale", moonScale.toFixed(3));
                root.style.setProperty(
                    "--moon-opacity",
                    moonOpacity.toFixed(3),
                );
                root.style.setProperty(
                    "--twilight-opacity",
                    twilightOpacity.toFixed(3),
                );
                root.style.setProperty(
                    "--night-overlay",
                    nightOverlay.toFixed(3),
                );
                root.style.setProperty(
                    "--star-opacity",
                    starOpacity.toFixed(3),
                );
                root.style.setProperty(
                    "--day-cloud-opacity",
                    dayCloudOpacity.toFixed(3),
                );
                root.style.setProperty(
                    "--night-cloud-opacity",
                    nightCloudOpacity.toFixed(3),
                );
                root.style.setProperty(
                    "--scene-shift",
                    `${sceneShift.toFixed(2)}px`,
                );
                document
                    .getElementById("navbar")
                    .classList.toggle("scrolled", window.scrollY > 24);
                updateSectionShells();
            }

            function scheduleScrollState() {
                if (scrollRafId) return;
                scrollRafId = requestAnimationFrame(() => {
                    scrollRafId = undefined;
                    updateScrollState();
                });
            }

            function initCursorGlow() {
                const glow = document.getElementById("cursor-glow");
                if (!glow || window.matchMedia("(pointer: coarse)").matches)
                    return;
                let rafId;

                window.addEventListener(
                    "pointermove",
                    (event) => {
                        const x = event.clientX - glow.offsetWidth / 2;
                        const y = event.clientY - glow.offsetHeight / 2;
                        glow.style.opacity = "1";
                        cancelAnimationFrame(rafId);
                        rafId = requestAnimationFrame(() => {
                            glow.style.transform = `translate(${x}px, ${y}px)`;
                        });
                    },
                    { passive: true },
                );

                document.addEventListener("pointerleave", () => {
                    glow.style.opacity = "0";
                });
            }

            function renderAll() {
                updateStaticLanguage();
                renderHero();
                renderExpertise();
                renderExperience();
                renderSkills();
                renderAISystem();
                renderProjects();
                renderWeb();
                initMediaFallbacks();
                initTilt();
                initMagneticButtons();
                typeWriter(true);
                requestAnimationFrame(() => {
                    reveal();
                    scheduleScrollState();
                });
            }

            function toggleLanguage() {
                currentLang = currentLang === "en" ? "th" : "en";
                renderAll();
            }

            document
                .getElementById("lang-toggle")
                .addEventListener("click", toggleLanguage);

            document
                .getElementById("ai-mode-recruiter")
                .addEventListener("click", () => setAIMode("recruiter"));
            document
                .getElementById("ai-mode-technical")
                .addEventListener("click", () => setAIMode("technical"));

            window.addEventListener("scroll", scheduleScrollState, {
                passive: true,
            });

            window.addEventListener("resize", () => {
                reveal();
                scheduleScrollState();
            });

            window.addEventListener("load", () => {
                renderAll();
                initCursorGlow();
            });
        </script>
    </body>
</html>
